    <script>
      // const darkIcon = "logo-dark.svg";
      // const lightIcon = "logo-light.svg";

      const darkIcon = "logo.ico";
      const lightIcon = "logo.ico";

      const favicon = document.getElementById("favicon");

      function updateFavicon(e) {
        favicon.href = e.matches ? darkIcon : lightIcon;
      }

      const darkQuery = window.matchMedia("(prefers-color-scheme: dark)");
      updateFavicon(darkQuery);
      darkQuery.addEventListener("change", updateFavicon);
    </script>
