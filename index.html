<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nguyen Trong Phuc — PX03</title>
    <meta name="description" content="Nguyen Trong Phuc — Software Developer" />

    <link rel="icon" type="image/x-icon" href="px03.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="page-wrapper">

      <!-- Header -->
      <header class="site-header">
        <div class="header-inner">
          <span class="status-dot" aria-label="Available"></span>
        </div>
      </header>

      <!-- Hero -->
      <section class="hero reveal">
        <div class="hero-text">
          <div class="hero-eyebrow">~/ntrongphuc</div>
          <h1 class="hero-name">
            <span class="name-line">Nguyen</span>
            <span class="name-line accent">Trong Phuc</span>
          </h1>
        </div>
        <p class="hero-tagline">
          <span id="typed-text"></span><span class="cursor-blink" aria-hidden="true">&#9646;</span>
        </p>
      </section>

      <!-- About -->
      <section class="about reveal">
        <div class="section-label"><span class="prompt">$</span> cat about.txt</div>
        <p class="about-text">
          You can call me <strong class="name-highlight">Phuc</strong>.
          I build <strong>modern</strong>, <strong>scalable</strong>,
          and <strong>creative</strong> applications. Also known as
          <strong class="mono-accent">PX03</strong> around the internet.
        </p>
      </section>

      <!-- Links -->
      <section class="links reveal">
        <div class="section-label"><span class="prompt">$</span> ls ./connect/</div>
        <div class="link-grid">
          <a href="https://github.com/ntrongphuc1302" class="link-card" target="_blank" rel="noopener">
            <span class="prompt">&gt;</span>
            <span class="link-card-title">github</span>
            <span class="link-card-sub">github.com/ntrongphuc1302</span>
          </a>
          <a href="mailto:ntrongphuc.1302@gmail.com" class="link-card">
            <span class="prompt">&gt;</span>
            <span class="link-card-title">email</span>
            <span class="link-card-sub">ntrongphuc.1302@gmail.com</span>
          </a>
        </div>
      </section>

      <!-- Footer -->
      <footer class="site-footer">
        <p>Built from scratch &mdash; <span class="footer-accent">Phuc</span></p>
      </footer>

    </div>

    <script src="main.js"></script>
  </body>
</html>
